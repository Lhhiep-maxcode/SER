model_name_or_path: Qwen/Qwen3-8B
enable_thinking: true
output_dir: Baseline/outputs/grpo_dapo_taco_qwen3_8b
seed: 42

# Training data is now preprocessed once with Baseline/preprocess_datasets.py.
# It contains DAPO-Math-17k math rows + TACO code rows only.
processed_train_path: Baseline/processed/dapo_taco/train
processed_eval_dir: Baseline/processed/dapo_taco/eval
eval_dataset_names:
  - gsm8k
  - math500
  - mbpp
  - humaneval

# Kept for experiment bookkeeping and code-execution safety checks. Actual
# weighted sampling happens in Baseline/preprocess_datasets.py.
task_weights:
  math: 0.5
  code: 0.5
max_train_samples:

# GRPO / generation.
num_generations: 8
max_prompt_length: 1024
max_completion_length: 2048
learning_rate: 1.0e-6
max_steps: 1000
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
generation_batch_size:
steps_per_generation:
temperature: 1.0
top_p: 1.0
beta: 0.0
loss_type: dapo
scale_rewards: group
mask_truncated_completions: false

# Server-oriented precision/runtime defaults.
bf16: true
tf32: true
gradient_checkpointing: true
use_cache: false
dataloader_num_workers: 4
save_steps: 100
save_total_limit: 3
report_to: "tensorboard"
logging_dir: Baseline/outputs/tensorboard/grpo_dapo_taco_qwen3_8b
run_name: grpo_dapo_taco_qwen3_8b
logging_steps: 10
logging_first_step: true

# Optional vLLM acceleration. Set use_vllm: true after starting:
# trl vllm-serve --model Qwen/Qwen3-8B
use_vllm: false
vllm_mode: server
vllm_server_host: 0.0.0.0
vllm_server_port: 8000
vllm_server_timeout: 240.0

# Code verifier safety. Training must still pass --allow_code_execution unless
# this is explicitly flipped to true in a trusted environment.
allow_code_execution: false
code_timeout_seconds: 5.0

# Evaluation defaults used by Baseline/evaluate.py.
eval_strategy: "no"
eval_batch_size: 1
eval_max_new_tokens: 2048
