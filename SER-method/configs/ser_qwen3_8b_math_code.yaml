model_dir: /workspace/storage-shared/models/Qwen3-8B
output_dir: SER-method/outputs/ser_qwen3_8b_math_code
log_file: SER-method/outputs/ser_qwen3_8b_math_code/train.jsonl
resume_from_checkpoint: ""
tensorboard_log_dir: SER-method/outputs/ser_qwen3_8b_math_code/tensorboard
use_tensorboard: true

env_data_paths:
  math: SER-method/processed/dapo_taco/math
  code: SER-method/processed/dapo_taco/code
env_batch_size:
  math: 1
  code: 1
max_env_samples:
  math:
  code:
shuffle_dataset: true
num_workers: 2

num_epochs: 1
max_steps:
accumulation_steps: 8
target_lr: 1.0e-6
max_grad_norm: 1.0

repeated_generate_nums: 8
grpo_iteration_num: 1
temperature: 1.0
top_p: 0.95
max_length: 2048
max_prompt_length: 1024
max_training_token: 3072
max_training_padding_gap: 256
epsilon: 0.1
beta: 0.01

rollout_chunk_tokens: 256
generation_micro_batch_size: 8
enable_thinking: true
allow_code_execution: false
code_timeout_seconds: 10.0

use_cache: true
gradient_checkpointing: false
lora_r: 64
lora_alpha: 32
lora_dropout: 0.0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

critic:
  enabled: true
  base_url: http://127.0.0.1:8000
  model: /workspace/storage-shared/models/Qwen3-235B-A22B
  api_key: ""
  timeout_seconds: 30.0
  max_retries: 2
  max_prompt_chars: 6000
  temperature: 0.0

thresholds:
  math:
    accept: 0.9
    reject: 0.1
    min_tokens: 128
    check_every_tokens: 256
  code:
    accept: 0.98
    reject: 0.05
    min_tokens: 256
    check_every_tokens: 256

budget:
  ema_alpha: 0.2
  utility_floor: 0.01
  cost_floor: 0.001
  min_probability: 0.1

save_steps: 500
seed: 42
